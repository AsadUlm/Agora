name: Deploy AGORA to Cloud Run

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: agora-server
  IMAGE_TAG: ${{ github.sha }}
  PUSH: "1"

  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CLOUD_RUN_SERVICE: agora-service
  CLOUD_RUN_REGION: asia-northeast3

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend, build Docker image, and push
        run: |
          chmod +x ./scripts/build-and-push-docker.sh
          ./scripts/build-and-push-docker.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image="docker.io/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG" \
            --region="$CLOUD_RUN_REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --project="$GCP_PROJECT_ID"

      - name: Show deployed service URL
        run: |
          gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region="$CLOUD_RUN_REGION" \
            --project="$GCP_PROJECT_ID" \
            --format="value(status.url)"